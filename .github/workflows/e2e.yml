name: E2E

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
        working-directory: /home/hossein/Desktop/projects/mehdi/building-management

      - name: Build web app
        run: pnpm --filter web build

      - name: Run Playwright smoke tests
        run: pnpm --filter web exec playwright test e2e/tests/offline-sync.spec.ts e2e/tests/daily-report.spec.ts e2e/tests/contracts-ipc.spec.ts
        working-directory: /home/hossein/Desktop/projects/mehdi/building-management
        env:
          CI: "true"
