name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ci.yml"

jobs:
  web:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web build

  api:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ipcas
          POSTGRES_PASSWORD: ipcas
          POSTGRES_DB: ipcas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ipcas -d ipcas_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ipcas:ipcas@localhost:5432/ipcas_test
      SECRET_KEY: ci-test-secret
      DEBUG: "true"
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r apps/api/requirements.txt
      - run: python manage.py check
        working-directory: apps/api/core
      - run: python manage.py migrate --noinput
        working-directory: apps/api/core
      - run: python manage.py verify_blueprint_schema
        working-directory: apps/api/core
      - run: python manage.py test events authentication
        working-directory: apps/api/core
