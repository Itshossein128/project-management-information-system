# Sample Action: mark inactive issues/PRs so the board stays tidy.
# Safe defaults — only marks, does not auto-close for 14 more days.
name: Stale

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch: # run manually from Actions tab

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: >
            This issue has been inactive for 60 days. Comment to keep it open,
            or it will close in 14 days.
          stale-pr-message: >
            This PR has been inactive for 60 days. Comment or push to keep it open,
            or it will close in 14 days.
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"
