services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ipcas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ipcas}
      POSTGRES_DB: ${POSTGRES_DB:-ipcas}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ipcas}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-ipcas}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-ipcas}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-ipcas-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-ipcas} $${MINIO_ROOT_PASSWORD:-ipcas-secret};
      mc mb -p local/$${AWS_STORAGE_BUCKET_NAME:-ipcas-files} || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-ipcas}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-ipcas-secret}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-ipcas-files}

  api:
    build: ./apps/api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ipcas}:${POSTGRES_PASSWORD:-ipcas}@postgres:5432/${POSTGRES_DB:-ipcas}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      DEBUG: ${DEBUG:-true}
      ALLOWED_HOSTS: localhost,127.0.0.1,api,traefik
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://localhost:8080
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-ipcas}:${RABBITMQ_DEFAULT_PASS:-ipcas}@rabbitmq:5672/
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-ipcas}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-ipcas-secret}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-ipcas-files}
      AWS_S3_USE_SSL: "false"
    ports:
      - "8000:8000"

  worker:
    build: ./apps/api
    command: python manage.py run_event_worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ipcas}:${POSTGRES_PASSWORD:-ipcas}@postgres:5432/${POSTGRES_DB:-ipcas}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      DEBUG: ${DEBUG:-true}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-ipcas}:${RABBITMQ_DEFAULT_PASS:-ipcas}@rabbitmq:5672/
      AUDIT_LOG_ASYNC: "true"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - api
    environment:
      PORT: "3000"
    ports:
      - "3000:3000"

  traefik:
    image: traefik:v3.3
    depends_on:
      - api
      - web
    ports:
      - "8080:8080"
    volumes:
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro

volumes:
  pgdata:
  minio_data:
